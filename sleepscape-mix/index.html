<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open in SleepScape</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(160deg, #0A0E1A 0%, #1A1244 60%, #2D1B69 100%);
  color: #E8E8F0;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  width: 100%; max-width: 380px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 217, 61, 0.2);
  border-radius: 24px;
  padding: 32px 24px;
  text-align: center;
  backdrop-filter: blur(20px);
}
.icon {
  width: 80px; height: 80px;
  margin: 0 auto 20px;
  background: rgba(255, 217, 61, 0.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
}
h1 {
  font-size: 24px; font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #FFD93D, #4ECDC4);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
}
.mix-name {
  font-size: 18px; font-weight: 600;
  margin: 16px 0 8px;
  color: #FFD93D;
}
.subtitle {
  font-size: 14px; color: #B0B2C3;
  margin-bottom: 24px; line-height: 1.5;
}
.btn {
  display: block;
  width: 100%;
  padding: 14px 20px;
  border-radius: 28px;
  font-size: 15px; font-weight: 600;
  text-decoration: none;
  margin-bottom: 10px;
  transition: transform 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: #FFD93D;
  color: #0A0E1A;
}
.btn-secondary {
  background: rgba(255, 255, 255, 0.08);
  color: #E8E8F0;
  border: 1px solid rgba(255, 255, 255, 0.15);
}
.footer {
  margin-top: 20px;
  font-size: 11px; color: #8A8CA2;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🌙</div>
  <h1>SleepScape Mix</h1>
  <div class="mix-name" id="mixName">Shared sleep mix</div>
  <div class="subtitle">Someone shared a calming sleep mix with you. Open it in SleepScape to start listening.</div>
  <a id="appLink" class="btn btn-primary" href="#">Open in SleepScape</a>
  <a id="playStoreLink" class="btn btn-secondary" href="https://play.google.com/store/apps/details?id=com.semadev.sleepscape">Get SleepScape on Play Store</a>
  <div class="footer">SleepScape · LAKADOKI</div>
</div>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const ids = params.get('ids') || '';
  const vols = params.get('vols') || '';
  const name = params.get('name') || 'Shared mix';

  // Mix adı göster
  document.getElementById('mixName').textContent = decodeURIComponent(name);

  // Deep link
  const deepLink = 'sleepscape://mix?ids=' + encodeURIComponent(ids) +
                   '&vols=' + encodeURIComponent(vols) +
                   '&name=' + encodeURIComponent(name);
  document.getElementById('appLink').href = deepLink;

  // Auto-attempt to open app on Android
  const ua = navigator.userAgent.toLowerCase();
  if (ua.includes('android') && ids) {
    setTimeout(function() {
      window.location.href = deepLink;
    }, 600);
  }
})();
</script>
</body>
</html>
